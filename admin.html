<!DOCTYPE html>
<html>
<head>
  <title>Painel Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      background: #020617;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    h1, h2 {
      color: gold;
    }

    .box {
      background: #111827;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input, select, button {
      display: block;
      margin: 8px 0;
      padding: 10px;
      width: 300px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: gold;
      cursor: pointer;
      font-weight: bold;
    }

    .list {
      margin-top: 10px;
      font-size: 14px;
      color: #cbd5f5;
    }
  </style>
</head>

<body>

<h1>⚙️ Painel Administrativo</h1>

<!-- CLUBES -->
<div class="box">
  <h2>🏟️ Clubes</h2>
  <input id="clube_nome" placeholder="Nome do clube">
  <input id="clube_cidade" placeholder="Cidade">
  <button onclick="addClube()">Cadastrar Clube</button>

  <div class="list" id="listaClubes"></div>
</div>

<!-- ATLETAS -->
<div class="box">
  <h2>🎯 Atletas</h2>
  <input id="atleta_nome" placeholder="Nome">
  <input id="atleta_categoria" placeholder="Categoria">
  <input id="atleta_sexo" placeholder="Sexo">

  <select id="select_clube"></select>

  <button onclick="addAtleta()">Cadastrar Atleta</button>

  <div class="list" id="listaAtletas"></div>
</div>

<!-- PONTUAÇÃO -->
<div class="box">
  <h2>📊 Pontuação</h2>

  <select id="select_atleta"></select>

  <input id="pontuacao_etapa" placeholder="Etapa">
  <input id="pontuacao_data" type="date">
  <input id="pontuacao_pontos" placeholder="Pontos">

  <button onclick="addPontuacao()">Lançar Pontuação</button>
</div>

<script>
const supabase = supabase.createClient(
  "sb_publishable_MZdbaT0GRL7WqBbC8G0cVQ_fTz9VgPj",
  "sb_secret_zFn5frdUbjYDFkEWlVtsjQ_Z6qO090b"
);

// CARREGAR DADOS
async function carregarDados() {

  // CLUBES
  let { data: clubes } = await supabase.from('clubes').select('*');

  let selectClubes = document.getElementById('select_clube');
  let listaClubes = document.getElementById('listaClubes');

  selectClubes.innerHTML = '';
  listaClubes.innerHTML = '';

  clubes.forEach(c => {
    selectClubes.innerHTML += `<option value="${c.id}">${c.nome}</option>`;
    listaClubes.innerHTML += `${c.id} - ${c.nome}<br>`;
  });

  // ATLETAS
  let { data: atletas } = await supabase
    .from('atiradores')
    .select('id, nome, clubes(nome)');

  let selectAtleta = document.getElementById('select_atleta');
  let listaAtletas = document.getElementById('listaAtletas');

  selectAtleta.innerHTML = '';
  listaAtletas.innerHTML = '';

  atletas.forEach(a => {
    selectAtleta.innerHTML += `<option value="${a.id}">${a.nome}</option>`;
    listaAtletas.innerHTML += `${a.id} - ${a.nome} (${a.clubes.nome})<br>`;
  });
}

// CADASTRAR CLUBE
async function addClube() {
  let nome = document.getElementById('clube_nome').value;
  let cidade = document.getElementById('clube_cidade').value;

  await supabase.from('clubes').insert([{ nome, cidade }]);

  alert("Clube cadastrado!");
  carregarDados();
}

// CADASTRAR ATLETA
async function addAtleta() {
  let nome = document.getElementById('atleta_nome').value;
  let categoria = document.getElementById('atleta_categoria').value;
  let sexo = document.getElementById('atleta_sexo').value;
  let clube_id = document.getElementById('select_clube').value;

  await supabase.from('atiradores').insert([
    { nome, categoria, sexo, clube_id }
  ]);

  alert("Atleta cadastrado!");
  carregarDados();
}

// LANÇAR PONTUAÇÃO
async function addPontuacao() {
  let atirador_id = document.getElementById('select_atleta').value;
  let etapa = document.getElementById('pontuacao_etapa').value;
  let data = document.getElementById('pontuacao_data').value;
  let pontos = document.getElementById('pontuacao_pontos').value;

  await supabase.from('pontuacoes').insert([
    { atirador_id, etapa, data, pontos }
  ]);

  alert("Pontuação registrada!");
}

// INICIAR
carregarDados();
</script>

</body>
</html>
