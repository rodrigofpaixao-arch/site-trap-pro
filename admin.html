<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="background:#0f172a;color:white">

<h2>Cadastro Atleta</h2>

<input id="nome">
<select id="sexo">
<option value="M">M</option>
<option value="F">F</option>
</select>

<select id="categoria">
<option value="A">A</option>
<option value="B">B</option>
</select>

<button onclick="add()">Salvar</button>

<script>
const { createClient } = supabase;

const client = createClient(
"https://izpvoeeedpmzvmtartsa.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

let clube_id=null;

async function proteger(){

const { data: { user } } = await client.auth.getUser();
if(!user) window.location.href="login.html";

let { data } = await client
.from('perfis')
.select('clube_id')
.eq('id', user.id)
.single();

clube_id=data.clube_id;
}

async function add(){

let nome=document.getElementById("nome").value.toUpperCase();
let sexo=document.getElementById("sexo").value;
let categoria=document.getElementById("categoria").value;

await client.from('atiradores')
.insert([{nome,sexo,categoria,clube_id}]);

alert("Salvo");
}

proteger();
</script>

</body>
</html>
