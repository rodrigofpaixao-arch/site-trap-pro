<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f1f5f9;padding:20px;}
.box{background:white;padding:20px;border-radius:10px;margin-bottom:20px;}
input,select,button{padding:10px;margin:5px;}
</style>
</head>

<body>

<h1>⚙️ Admin</h1>

<div class="box">
<h2>Cadastrar Atleta</h2>

<input id="nome" placeholder="Nome">

<select id="sexo" onchange="ajustarCategoria()">
<option value="M">Masculino</option>
<option value="F">Feminino</option>
</select>

<select id="categoria">
<option value="A">A</option>
<option value="B">B</option>
</select>

<button onclick="cadastrar()">Salvar</button>
</div>

<script>
const client = supabase.createClient(
"https://izpvoeeedpmzvmtartsa.supabase.co",
"SUA_ANON_KEY"
);

// 🔥 BLOQUEIO INTELIGENTE
function ajustarCategoria(){
let sexo = document.getElementById("sexo").value;
let cat = document.getElementById("categoria");

if(sexo === "F"){
  cat.value = "A";
  cat.innerHTML = `<option value="A">A</option>`;
}else{
  cat.innerHTML = `
    <option value="A">A</option>
    <option value="B">B</option>
  `;
}
}

// cadastrar
async function cadastrar(){

let nome = document.getElementById("nome").value;
let sexo = document.getElementById("sexo").value;
let categoria = document.getElementById("categoria").value;

let { error } = await client
.from('atiradores')
.insert([{ nome, sexo, categoria }]);

if(error){
  alert("Erro: " + error.message);
}else{
  alert("Cadastrado!");
}
}

// iniciar
ajustarCategoria();
</script>

</body>
</html>
