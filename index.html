<!DOCTYPE html>
<html>
<head>
<title>Ranking</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="background:#0f172a;color:white;font-family:Arial;padding:20px">

<h1>🏆 Ranking</h1>
<table border="1" width="100%">
<thead>
<tr>
<th>#</th>
<th>Nome</th>
<th>Pontos</th>
</tr>
</thead>
<tbody id="ranking"></tbody>
</table>

<script>
const { createClient } = supabase;

const client = createClient(
"https://izpvoeeedpmzvmtartsa.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6cHZvZWVlZHBtenZtdGFydHNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODc3NjMsImV4cCI6MjA5MjQ2Mzc2M30.AoYhypS7MhMfb-HuaxkIFgt2Kmw1pcsJlIooo4eDI28"
);

async function proteger(){
  const { data: { user } } = await client.auth.getUser();
  if(!user) window.location.href = "login.html";
}

async function carregar(){

let { data } = await client
.from('pontuacoes')
.select(`pontos, atiradores(nome)`);

let ranking = {};

data.forEach(p=>{
let nome = p.atiradores?.nome;
if(!nome) return;

if(!ranking[nome]) ranking[nome]=0;
ranking[nome]+=p.pontos;
});

let lista = Object.entries(ranking)
.map(([nome,pontos])=>({nome,pontos}))
.sort((a,b)=>b.pontos-a.pontos);

let html="";
lista.forEach((i,x)=>{
html+=`<tr><td>${x+1}</td><td>${i.nome}</td><td>${i.pontos}</td></tr>`;
});

document.getElementById("ranking").innerHTML = html;
}

async function iniciar(){
await proteger();
carregar();
}

iniciar();
</script>

</body>
</html>
