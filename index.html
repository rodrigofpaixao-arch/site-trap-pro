<!DOCTYPE html>
<html>
<head>
  <title>Ranking Trap</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<header>
  <h1>🏆 Trap Ranking</h1>
  <nav>
    <a href="index.html">Ranking</a>
    <a href="atletas.html">Atletas</a>
    <a href="clubes.html">Clubes</a>
  </nav>
</header>

<div class="container">

  <h2>Ranking Geral</h2>

  <div class="search">
    <input type="text" id="busca" placeholder="Buscar atleta...">
  </div>

  <div id="ranking"></div>

</div>

<script src="app.js"></script>

<script>
let rankingGlobal = [];

async function carregar() {
  rankingGlobal = await getRanking();
  renderizar(rankingGlobal);
}

function renderizar(lista) {
  const div = document.getElementById('ranking');
  div.innerHTML = '';

  lista.forEach((item, i) => {
    let classe = '';
    if (i === 0) classe = 'gold';
    else if (i === 1) classe = 'silver';
    else if (i === 2) classe = 'bronze';

    div.innerHTML += `
      <div class="card ${classe}">
        <div class="rank">${i+1}º</div>
        ${item.nome} - ${item.clube}
        <br><strong>${item.pontos} pts</strong>
      </div>
    `;
  });
}

document.getElementById('busca').addEventListener('input', (e) => {
  let termo = e.target.value.toLowerCase();

  let filtrado = rankingGlobal.filter(a =>
    a.nome.toLowerCase().includes(termo)
  );

  renderizar(filtrado);
});

carregar();
</script>

</body>
</html>
