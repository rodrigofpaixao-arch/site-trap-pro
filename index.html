    table {
      width:100%;
      border-collapse:collapse;
    }

    th, td {
      border:1px solid #334155;
      padding:10px;
    }

    th { background:#1e293b; }
  </style>
</head>

<body>

<!-- MENU -->

  <button onclick="window.location.href='admin.html'">⚙️ Admin</button>
</div>

<h1>🏆 Ranking</h1>

<table>
<thead>
<tr>
  <th>#</th>
  <th>Nome</th>
  <th>Clube</th>
  <th>Pontos</th>
</tr>
</thead>
<tbody id="ranking"></tbody>
</table>

</div>

<script>
const { createClient } = supabase;

const client = createClient(
  "https://izpvoeeedpmzvmtartsa.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6cHZvZWVlZHBtenZtdGFydHNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODc3NjMsImV4cCI6MjA5MjQ2Mzc2M30.AoYhypS7MhMfb-HuaxkIFgt2Kmw1pcsJlIooo4eDI28"
);

async function carregarRanking() {

  let { data, error } = await client
    .from('pontuacoes')
    .select(`
      pontos,
      atiradores (
        nome,
        clubes:clube_id (nome)
      )
    `);

  if (error) {
    console.error(error);
    return;
  }

  let ranking = {};

  data.forEach(p => {
    let nome = p.atiradores.nome;

    if (!ranking[nome]) {
      ranking[nome] = {
        pontos:0,
        clube:p.atiradores.clubes?.nome || "-"
      };
    }

    ranking[nome].pontos += p.pontos;
  });

  let lista = Object.entries(ranking)
    .map(([nome,d]) => ({ nome, ...d }))
    .sort((a,b)=>b.pontos-a.pontos);

  let html="";
  lista.forEach((i,x)=>{
    html += `<tr>
      <td>${x+1}</td>
      <td>${i.nome}</td>
      <td>${i.clube}</td>
      <td>${i.pontos}</td>
    </tr>`;
  });

  document.getElementById("ranking").innerHTML = html;
}

carregarRanking();
</script>
