<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="background:#0f172a;color:white;font-family:Arial;padding:20px">

<h1>📊 Dashboard</h1>

<h2>👩 Feminino</h2>
<div id="f"></div>

<h2>👨 Masculino A</h2>
<div id="ma"></div>

<h2>👨 Masculino B</h2>
<div id="mb"></div>

<script>
const { createClient } = supabase;
const client = createClient("https://izpvoeeedpmzvmtartsa.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6cHZvZWVlZHBtenZtdGFydHNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODc3NjMsImV4cCI6MjA5MjQ2Mzc2M30.AoYhypS7MhMfb-HuaxkIFgt2Kmw1pcsJlIooo4eDI28");

async function carregar(){

let {data}=await client.from('pontuacoes')
.select(`pontos,atiradores(nome,sexo,categoria)`)

let r={}

data.forEach(p=>{
let a=p.atiradores
if(!a)return

if(!r[a.nome]){
r[a.nome]={p:0,s:a.sexo,c:a.categoria}
}

r[a.nome].p+=p.pontos
})

let lista=Object.entries(r).map(([n,d])=>({n,...d}))

function render(filtro,id){
let html=""
lista.filter(filtro).sort((a,b)=>b.p-a.p)
.forEach((i,x)=>{
html+=`${x+1}º - ${i.n} (${i.p})<br>`
})
document.getElementById(id).innerHTML=html
}

render(a=>a.s==="F","f")
render(a=>a.s==="M"&&a.c==="A","ma")
render(a=>a.s==="M"&&a.c==="B","mb")
}

carregar()
</script>

</body>
</html>
