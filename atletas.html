<h1>🎯 Lista de Atletas</h1>

      <th>Nome</th>
      <th>Categoria</th>
      <th>Sexo</th>
      <th>Clube</th>
    </tr>
  </thead>
  <tbody id="listaAtletas"></tbody>
</table>

<script>
let client;

// INICIAR
window.onload = async function () {

  const { createClient } = supabase;

  client = createClient(
    "https://izpvoeeedpmzvmtartsa.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6cHZvZWVlZHBtenZtdGFydHNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODc3NjMsImV4cCI6MjA5MjQ2Mzc2M30.AoYhypS7MhMfb-HuaxkIFgt2Kmw1pcsJlIooo4eDI28"
  );

  carregarAtletas();
};

// CARREGAR ATLETAS
async function carregarAtletas() {

  let { data, error } = await client
    .from('atiradores')
    .select(`
      nome,
      categoria,
      sexo,
      clubes (nome)
    `);

  if (error) {
    console.error("Erro:", error);
    return;
  }

  let html = "";

  data.forEach(a => {
    html += `
      <tr>
        <td>${a.nome}</td>
        <td>${a.categoria}</td>
        <td>${a.sexo}</td>
        <td>${a.clubes?.nome || "-"}</td>
      </tr>
    `;
  });

  document.getElementById("listaAtletas").innerHTML = html;
}
</script>
